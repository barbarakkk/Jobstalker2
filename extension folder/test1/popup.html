<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save LinkedIn Job</title>
  <style>
    body {
      font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      padding: 14px;
      width: 300px;
      box-sizing: border-box;
      margin: 0;
    }
    label { display: block; margin-top: 8px; font-size: 13px; }
    select, textarea, input { width: 100%; padding:6px; margin-top:4px; box-sizing:border-box; }
    button { margin-top: 12px; padding: 8px 12px; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
    .primary { background:#2e7d32; color:white; }
    .secondary { background:#f0f0f0; }
    .status { margin:6px 0; font-size: 14px; }
    .small { font-size:11px; color:#555; }
    .section { margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="section">
    <div><strong>LinkedIn job data</strong></div>
    <div id="job-summary" class="small">Fetching...</div>
  </div>

  <div class="section">
    <label for="excitement">Excitement (1–10)</label>
    <select id="excitement">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
      <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
    </select>

    <label for="status">Status</label>
    <select id="status">
      <option value="bookmarked">Bookmarked</option>
      <option value="interviewing">Interviewing</option>
      <option value="accepted">Accepted</option>
      <option value="rejected">Rejected</option>
    </select>

        <!-- Notes field removed - not in table schema -->
  </div>



  <div class="section">
    <button id="save" class="primary">Save to JobStalker</button>
    <div id="result" class="status"></div>
  </div>

  <div class="small">
    AI analysis will be automatically applied to job postings.
  </div>

  <script src="popup.js"></script>
</body>
</html>
