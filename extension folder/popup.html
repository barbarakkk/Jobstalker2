<!DOCTYPE html>
<html>
<head>
  <title>JobStalker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth-container">
    <div id="not-authenticated" style="display: none;">
      <h2>Sign In Required</h2>
      <p>Please sign in to JobStalker to save jobs.</p>
      <button id="login-btn" class="primary-btn">Sign In</button>
    </div>
    
    <div id="authenticated" style="display: none;">
      <div class="user-info">
        <span id="user-email"></span>
        <button id="logout-btn" class="text-btn">Sign Out</button>
      </div>
    </div>
  </div>

  <div id="job-form" style="display: none;">
    <h2>Save Job</h2>
    <form id="save-job-form">
      <div class="form-group">
        <label for="title">Job Title</label>
        <input type="text" id="title" name="title" required>
      </div>

      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" required>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" required>
      </div>

      <div class="form-group">
        <label for="salary">Salary</label>
        <input type="text" id="salary" name="salary">
      </div>

      <div class="form-group">
        <label for="stage">Stage</label>
        <select id="stage" name="stage" required>
          <option value="Bookmarked">Bookmarked</option>
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>

      <div class="form-group">
        <label for="excitement">Excitement</label>
        <div class="star-rating">
          <input type="radio" id="star5" name="excitement" value="5">
          <label for="star5">★</label>
          <input type="radio" id="star4" name="excitement" value="4">
          <label for="star4">★</label>
          <input type="radio" id="star3" name="excitement" value="3">
          <label for="star3">★</label>
          <input type="radio" id="star2" name="excitement" value="2">
          <label for="star2">★</label>
          <input type="radio" id="star1" name="excitement" value="1">
          <label for="star1">★</label>
        </div>
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3"></textarea>
      </div>

      <input type="hidden" id="url" name="url">
      
      <div class="form-actions">
        <button type="submit" class="primary-btn">Save Job</button>
      </div>
    </form>
  </div>

  <div id="status-message" class="status-message" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
